<!doctype html>
<html lang="no">
  <head><meta charset="utf-8" /><title>Skjema</title></head>
  <body>
    <!-- Netlify oppdager skjema ved build. Ikke slett. -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="fornavn" />
      <input type="text" name="etternavn" />
      <input type="email" name="epost" />
      <textarea name="melding"></textarea>
    </form>
    <form name="vekstpilot-diagnose" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="vekstpilot-diagnose" />
      <input type="text" name="navn" />
      <input type="text" name="selskap" />
      <input type="email" name="epost" />
      <input type="tel" name="telefon" />
      <select name="antall-selgere"></select>
      <select name="crm"></select>
      <textarea name="salgshindreret"></textarea>
    </form>
    <form name="crm-helsesjekk" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="crm-helsesjekk" />
      <input type="text" name="navn" />
      <input type="text" name="selskap" />
      <input type="email" name="epost" />
      <input type="tel" name="telefon" />
      <select name="crm"></select>
      <select name="crm-bruk"></select>
      <textarea name="utfordring"></textarea>
    </form>
  </body>
</html>
